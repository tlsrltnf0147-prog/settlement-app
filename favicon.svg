<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#3182F6"/>
  <!-- Receipt shape -->
  <rect x="14" y="10" width="36" height="42" rx="4" fill="white"/>
  <!-- Zigzag bottom -->
  <polygon points="14,52 17,48 20,52 23,48 26,52 29,48 32,52 35,48 38,52 41,48 44,52 50,52 50,56 14,56" fill="#3182F6"/>
  <!-- Lines -->
  <rect x="20" y="18" width="24" height="3" rx="1.5" fill="#3182F6" opacity="0.25"/>
  <rect x="20" y="25" width="16" height="3" rx="1.5" fill="#3182F6" opacity="0.25"/>
  <!-- ₩ symbol -->
  <text x="32" y="46" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#3182F6" text-anchor="middle">₩</text>
</svg>
